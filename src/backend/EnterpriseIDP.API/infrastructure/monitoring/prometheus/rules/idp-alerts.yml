groups:
  - name: enterprise-idp
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          rate(http_requests_received_total{status=~"5.."}[5m]) 
          / rate(http_requests_received_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate on {{ $labels.instance }}"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: SlowResponseTime
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Slow p95 response time"
          description: "p95 latency is {{ $value | humanizeDuration }}"

      - alert: DeploymentFailureSpike
        expr: |
          increase(idp_deployments_total{status="failed"}[10m]) > 3
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Multiple deployment failures"
          description: "{{ $value }} deployments failed in last 10 minutes"

      - alert: BackendDown
        expr: up{job="enterprise-idp-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "IDP backend is down"
          description: "Backend has been unreachable for 1 minute"
