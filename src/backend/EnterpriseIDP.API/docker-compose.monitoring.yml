version: '3.8'

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: idp-prometheus
    networks: [monitoring]
    ports: ['9090:9090']
    volumes:
      - ./infrastructure/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: idp-grafana
    networks: [monitoring]
    ports: ['3001:3000']
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: idp-loki
    networks: [monitoring]
    ports: ['3100:3100']
    volumes:
      - ./infrastructure/monitoring/loki:/etc/loki
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/loki-config.yml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: idp-promtail
    networks: [monitoring]
    volumes:
      - ./infrastructure/monitoring/promtail:/etc/promtail
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: idp-jaeger
    networks: [monitoring]
    ports:
      - '16686:16686'
      - '4317:4317'
      - '4318:4318'
    environment:
      COLLECTOR_OTLP_ENABLED: true
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: idp-alertmanager
    networks: [monitoring]
    ports: ['9093:9093']
    volumes:
      - ./infrastructure/monitoring/alertmanager:/etc/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
