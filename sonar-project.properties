# ============================================================
# SonarQube / SonarCloud Configuration
# Enterprise Internal Developer Platform (IDP)
# ============================================================

# --- Project Identity ---
sonar.projectKey=niloykumarbarman_Internal-Developer-Platform-IDP
sonar.organization=niloykumarbarman
sonar.projectName=Enterprise Internal Developer Platform (IDP)
sonar.projectVersion=1.0

# --- Source & Test Paths ---
sonar.sources=src/backend,src/frontend/src
sonar.tests=src/backend,src/frontend/src

# Backend: C# test file pattern
sonar.cs.analyzer.projectOutPaths=src/backend
sonar.test.inclusions=**/*Tests.cs,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# --- Exclusions (generated / vendor / build output) ---
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/build/**,**/*.Designer.cs,**/Migrations/**,**/wwwroot/**,**/coverage/**

sonar.coverage.exclusions=**/Migrations/**,**/Program.cs,**/*.Designer.cs,**/DependencyInjection.cs,**/Contracts/**

# --- .NET specific ---
sonar.cs.vstest.reportsPaths=src/backend/coverage/**/*.trx
sonar.cs.vscoveragexml.reportsPaths=src/backend/coverage/**/*.coverage.xml
sonar.cs.opencover.reportsPaths=src/backend/coverage/**/coverage.opencover.xml

# --- JavaScript / TypeScript (frontend, once scaffolded) ---
sonar.javascript.lcov.reportPaths=src/frontend/coverage/lcov.info
sonar.typescript.tsconfigPath=src/frontend/tsconfig.json

# --- Encoding ---
sonar.sourceEncoding=UTF-8

# --- Quality Gate behavior in CI ---
sonar.qualitygate.wait=true

# --- Links shown on SonarCloud project page ---
sonar.links.homepage=https://github.com/niloykumarbarman/-Internal-Developer-Platform-IDP-
sonar.links.scm=https://github.com/niloykumarbarman/-Internal-Developer-Platform-IDP-
sonar.links.ci=https://github.com/niloykumarbarman/-Internal-Developer-Platform-IDP-/actions
