services:
  - type: web
    name: enterprise-idp-backend
    runtime: docker
    dockerfilePath: ./src/backend/Dockerfile
    dockerContext: ./src/backend
    plan: free
    healthCheckPath: /health/live
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: "Host=aws-1-ap-southeast-2.pooler.supabase.com;Port=5432;Database=postgres;Username=postgres.ejyrfghpjfgepghninru;Password=?wXs%xxSzUf*H$6;SSL Mode=Require;Trust Server Certificate=true"
      - key: Jwt__Secret
        generateValue: true
      - key: Jwt__Issuer
        value: EnterpriseIDP
      - key: Jwt__Audience
        value: EnterpriseIDP
      - key: Frontend__Url
        value: https://enterprise-idp-frontend.onrender.com
      - key: Observability__OtlpEndpoint
        value: ""
      - key: ConnectionStrings__Redis
        value: ""

  - type: web
    name: enterprise-idp-frontend
    runtime: docker
    dockerfilePath: ./src/frontend/Dockerfile
    dockerContext: ./src/frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://enterprise-idp-backend.onrender.com/api
