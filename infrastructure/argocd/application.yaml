apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-idp-dev
  namespace: argocd
  labels:
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: enterprise-idp
  source:
    repoURL: https://github.com/niloykumarbarman/-Internal-Developer-Platform-IDP-.git
    targetRevision: main
    path: helm/enterprise-idp
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-idp-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
