apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-idp-prod
  namespace: argocd
  labels:
    environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: enterprise-idp
  source:
    repoURL: https://github.com/niloykumarbarman/-Internal-Developer-Platform-IDP-.git
    targetRevision: main
