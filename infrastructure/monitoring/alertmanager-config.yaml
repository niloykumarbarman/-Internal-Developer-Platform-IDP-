global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@enterprise-idp.com'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10m
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'
    - match:
        team: platform
      receiver: 'platform-team'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'platform-team@enterprise-idp.com'
        subject: '[IDP Alert] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

  - name: 'critical-receiver'
    email_configs:
      - to: 'oncall@enterprise-idp.com'
        subject: '🔴 [CRITICAL] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'
    webhook_configs:
      - url: 'http://enterprise-idp-backend:8080/api/incidents/webhook'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'platform-team@enterprise-idp.com'
        subject: '⚠️ [WARNING] {{ .GroupLabels.alertname }}'
        html: '{{ template "email.default.html" . }}'

  - name: 'platform-team'
    webhook_configs:
      - url: 'http://enterprise-idp-backend:8080/api/incidents/webhook'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
