replicaCount: 1
backend:
  env:
    ASPNETCORE_ENVIRONMENT: Development
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85
  config:
    frontendUrl: "http://localhost:3000"
ingress:
  enabled: false
